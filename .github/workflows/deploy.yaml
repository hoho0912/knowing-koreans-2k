# Observable Framework 정적 사이트(frontend-obs/)를 GitHub Pages로 배포.
# 트리거: main 푸시 + 수동 실행. 빌드는 Python loader(round1.json.py) → Observable build → Pages 업로드.

name: Deploy frontend-obs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "frontend-obs/**"
      - "frontend/data/run_N1000_museum-admission-free/**"
      - ".github/workflows/deploy.yaml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-obs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install pandas

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-obs/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend-obs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
